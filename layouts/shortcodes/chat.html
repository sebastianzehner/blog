<script type="text/javascript" src="/cactus.js"></script>
<link rel="stylesheet" href="/cactus.css" type="text/css" />
<style>
  /* === Cactus Chat – Blowfish Catppuccin === */
  /* Fix avatar image distortion */
  .cactus-comment-avatar img {
    max-width: unset;
    width: 40px;
    height: 40px;
    object-fit: cover;
  }
  /* --- Light / Catppuccin Latte --- */
  :root:not(.dark) {
    --cactus-text-color: var(--catppuccin-color-text);
    --cactus-text-color--soft: var(--catppuccin-color-subtext0);
    --cactus-background-color: transparent;
    --cactus-background-color--strong: var(--catppuccin-color-mantle);
    --cactus-border-color: var(--catppuccin-color-surface0);
    --cactus-border-width: 1px;
    --cactus-border-radius: 0.5em;
    --cactus-box-shadow-color: rgba(var(--color-neutral-900), 0.20);
    --cactus-button-text-color: var(--catppuccin-color-text);
    --cactus-button-color: var(--catppuccin-color-crust);
    --cactus-button-color--strong: var(--catppuccin-color-surface0);
    --cactus-button-color--stronger: var(--catppuccin-color-surface1);
    --cactus-login-form-text-color: var(--catppuccin-color-text);
    --cactus-error-color: var(--catppuccin-color-red);
  }
  /* --- Dark / Catppuccin Mocha --- */
  :root.dark {
    --cactus-text-color: var(--catppuccin-color-text);
    --cactus-text-color--soft: var(--catppuccin-color-subtext0);
    --cactus-background-color: transparent;
    --cactus-background-color--strong: var(--catppuccin-color-surface0);
    --cactus-border-color: var(--catppuccin-color-surface1);
    --cactus-border-width: 1px;
    --cactus-border-radius: 0.5em;
    --cactus-box-shadow-color: rgba(var(--color-neutral-50), 0.04);
    --cactus-button-text-color: var(--catppuccin-color-text);
    --cactus-button-color: var(--catppuccin-color-surface1);
    --cactus-button-color--strong: var(--catppuccin-color-surface2);
    --cactus-button-color--stronger: var(--catppuccin-color-overlay0);
    --cactus-login-form-text-color: var(--catppuccin-color-text);
    --cactus-error-color: var(--catppuccin-color-red);
  }
</style>
<br />
<div id="comment-section"></div>
<script>
  initComments({
    node: document.getElementById("comment-section"),
    defaultHomeserverUrl: "https://matrix.techlab.icu",
    serverName: "matrix.techlab.icu",
    siteName: "sebastianzehner",
    commentSectionId: "{{ index .Params 0 }}",
  });
</script>
